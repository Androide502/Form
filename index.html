<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    
    <form action="" method="post">
        <table>
            <tr>
                <td><label for="">Nombres:</label></td>
                <td><input type="text" name="" id=""></td>
            </tr>

            <tr>
                <td><label for="">Numero de cedula:</label></td>
                <td><input type="number" name="" id=""></td>
            </tr>

            <tr>
                <td><label for="">Fecha de nacimiento:</label></td>
                <td><input type="date" name="" id=""></td>
            </tr>

            <tr>
                <td><label for="">Ciudad:</label></td>
                <td><input type="text" name="" id=""></td>
            </tr>

            <tr>
                <td><label for="">Correo:</label></td>
                <td><input type="email" name="" id=""></td>
            </tr>

            <tr>
                <td><label for="">Telefono:</label></td>
                <td><input type="text" name="" id=""></td>
            </tr>

            <tr>
                <td><label for="">Direccion:</label></td>
                <td><textarea name="" id="" rows="4" cols="20"></textarea></td>
            </tr>

            <tr>
                <td><label for="">Estado civil:</label></td>
                <td>
                    <select name="" id="">
                        <option>Seleccione...</option>
                        <option>Soltero</option>
                        <option>Casado</option>
                        <option>Divorciado</option>
                        <option>Viudo</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td><label for="">Etnia:</label></td>
                <td>
                    <select name="" id="">
                        <option>Seleccione...</option>
                        <option>Mestizo</option>
                        <option>Afroecuatoriano</option>
                        <option>Indigena</option>
                        <option>Montubio</option>
                        <option>Blanco</option>
                        <option>Otro</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>Genero:</td>
                <td>
                    <input type="radio" name="rbtn_prueba" id=""> Masculino
                    <input type="radio" name="rbtn_prueba" id=""> Femenino
                    <input type="radio" name="rbtn_prueba" id=""> Otro
                </td>
            </tr>

            <tr>
                <td>Gustos personales:</td>
                <td>
                    <input type="checkbox" name="" id=""> Videojuegos
                    <input type="checkbox" name="" id=""> Musica
                    <input type="checkbox" name="" id=""> Dibujos
                    <input type="checkbox" name="" id=""> Tecnologias
                    <input type="checkbox" name="" id=""> Otros
                </td>
            </tr>

            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Enviar">
                    <input type="reset" value="Limpiar">
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
